services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alpr
      POSTGRES_PASSWORD: alpr
      POSTGRES_DB: alpr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "alpr"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set m http://minio:9000 minio minio12345 &&
      mc mb -p m/alpr-plans m/alpr-reports m/alpr-extracted &&
      mc anonymous set none m/alpr-plans m/alpr-reports m/alpr-extracted;
      exit 0
      "

  # ค่าเริ่มต้นของ app เป็นแบบ prod-safe (target: runner, ไม่ mount source) —
  # docker-compose.override.yml (auto-load เฉพาะตอนไม่ระบุ -f) จะสลับเป็นโหมด dev ให้
  # ส่วน docker-compose.prod.yml ใช้ -f ชัดเจนจึงไม่โดน override.yml ปนด้วย (ดู M8 note)
  app:
    build:
      context: .
      target: runner
    command: ["node", "server.js"]
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000${BASE_PATH:-/aipack}/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  miniodata:
